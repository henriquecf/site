title: "I Wanted Cheap Gas, So I Decompiled a Government App"
published_at: 2026-04-01 17:43:22
description: "My country has a government app that shows the cheapest fuel prices near you. No public API. I decompiled the APK, reverse-engineered the OAuth flow through the federal identity portal, discovered the endpoints, and built a scraper. The whole thing took an evening."
content_modified_at: null
linkedin_body: |
  My country has a government app that shows real-time fuel prices near you. Updated by gas stations via tax receipts, so the data is accurate. No public API. No export. Just a mobile app.

  I wanted the data. So I decompiled the APK. Turns out it's a Cordova/Ionic app, which means the entire logic is JavaScript sitting in the APK's assets folder. API base URL, endpoint paths, query parameters, auth flow, all right there in the bundled JS.

  The auth was the real puzzle. The app authenticates through the federal identity portal, but uses a custom URI scheme for the OAuth redirect. You can't register that scheme on a desktop. Ended up opening the auth flow in Chrome, logging in normally, and grabbing the authorization code from DevTools when the redirect fails.

  Wrote about the whole process, from unzipping the APK to a working scraper: https://hencf.org/blog/reverse-engineering-government-app
