title: "Scraping YouTube Transcripts in Ruby"
published_at: 2026-03-18 12:00:00
description: "YouTube's API doesn't expose captions for videos you don't own. After dead ends with protobuf encoding and IP-locked watch page URLs, I found a reliable approach using YouTube's InnerTube API with an Android client identity. Here's the full implementation in Ruby with no external dependencies."
linkedin_body: |
  Needed transcripts from 6,000+ YouTube videos for a knowledge base. YouTube's Data API doesn't expose captions for videos you don't own, so I had to find another way.

  Tried protobuf encoding first (YouTube changed the schema and every implementation broke). Then tried scraping caption URLs from the watch page (they're IP-locked, most requests 403). Finally found the trick: YouTube's InnerTube player API with an Android client identity returns stable caption URLs that work from any IP.

  The whole client is pure Ruby stdlib. No gems, no API keys from Google, no OAuth. Just net/http, json, and rexml parsing YouTube's srv3 XML format.

  Wrote up the dead ends and the working approach with the full implementation.

  https://hencf.org/blog/youtube-transcripts-ruby
x_body: |
  YouTube caption URLs from the watch page are IP-locked. Extract the URL, try to fetch it from the same server a second later, 403. Found out after trying to batch-process 6,000 videos.
  ---
  The trick is YouTube's InnerTube API with an Android client identity. clientName: "ANDROID" → stable caption URLs that aren't IP-locked. Pure Ruby stdlib, no Google API key needed. Third post in the Guia series.

  https://hencf.org/blog/youtube-transcripts-ruby
