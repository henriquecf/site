title: "Fetching YouTube Transcripts in Ruby"
published_at: 2026-03-19 12:00:00
description: "I needed captions from thousands of public YouTube videos for a knowledge base. The official API doesn't cover this use case, but YouTube's InnerTube player API does. Here's the full Ruby implementation using the same approach as youtube-transcript-api and Ruby Events, with no external dependencies."
linkedin_body: |
  Needed captions from 6,000+ public YouTube videos for a knowledge base. YouTube's official Captions API is scoped to videos you own, so I needed the same approach that projects like youtube-transcript-api and Ruby Events use: YouTube's InnerTube player API.

  Getting there wasn't straightforward. Old protobuf-based approaches broke when YouTube changed their schema. Watch page caption URLs turned out to be session-bound. The InnerTube API with an Android client context returns stable URLs and has been reliable across the whole dataset.

  Wrote up the journey and the full Ruby implementation. Pure stdlib, no gems needed.

  https://hencf.org/blog/youtube-transcripts-ruby
