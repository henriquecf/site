  ---
  The setup:
  • git worktree add per feature (instant, shared .git store)
  • cd into each worktree, run claude
  • Rotate between sessions reviewing + approving

  Coordination cost is real (rebasing, migration conflicts) but manageable if you pick isolated tasks.

  Practical limit: ~4 sessions before review quality drops.

