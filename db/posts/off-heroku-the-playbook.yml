linkedin_body: |
  Couple weeks ago I wrote about migrating BSPK off Heroku as an agentic-engineering story. This week, the technical companion: the configs, the cutover playbook, and the bugs I spent the most time on.

  The one I keep thinking about is the encrypted attributes migration. Rails encrypted columns derive their key from a digest of the master key plus a salt. Old rows were written with a SHA1-derived digest. The new Rails defaulted to SHA256. If I flipped the setting, every existing encrypted value would have become unreadable.

  The fix is a small dance: read with fallback, write with the new digest, let activity heal the legacy footprint over time. Invisible if you do it right. Catastrophic if you don't.

  Wrote up that one plus the rest of the playbook here: https://hencf.org/blog/off-heroku-the-playbook
